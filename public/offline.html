<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cashflow Offline</title>
    <meta name="theme-color" content="#2f7fc7">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background: #f4f9ff;
            color: #1e293b;
            font-family: Arial, sans-serif;
        }

        main {
            width: min(420px, calc(100% - 32px));
            padding: 28px;
            border: 1px solid #c9e3ff;
            border-radius: 18px;
            background: #fff;
            box-shadow: 0 24px 60px rgba(47, 127, 199, 0.16);
        }

        .logo {
            width: 56px;
            height: 56px;
            display: grid;
            place-items: center;
            border-radius: 16px;
            background: #e5f1ff;
            color: #2169a8;
            font-size: 28px;
            font-weight: 700;
        }

        h1 {
            margin: 20px 0 8px;
            font-size: 26px;
        }

        p {
            margin: 0;
            color: #64748b;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <main>
        <div class="logo">C</div>
        <h1>Kamu sedang offline</h1>
        <p>Cashflow sudah terpasang sebagai aplikasi web. Sambungkan internet lagi untuk memuat data terbaru.</p>
    </main>
</body>
</html>
